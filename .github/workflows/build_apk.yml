name: Build APK

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter diagnostics
        run: |
          flutter --version
          flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build -d

      - name: Build APK
        id: build_apk
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build apk --debug --android-skip-build-dependency-validation -v 2>&1 | tee flutter_build_apk.log

      - name: Gradle stacktrace on failure
        if: steps.build_apk.outcome == 'failure'
        run: |
          set -o pipefail
          cd android
          ./gradlew app:assembleDebug --stacktrace --info --no-daemon 2>&1 | tee ../gradle_assemble_debug.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mindful-build-logs
          path: |
            flutter_build_apk.log
            gradle_assemble_debug.log

      - name: Fail if build failed
        if: steps.build_apk.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        if: steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: mindful-debug-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk
